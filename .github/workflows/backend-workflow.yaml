name: backend_CI
on:
  workflow_call:
    secrets:
      TELEGRAM_TOKEN:
        required: true
      TELEGRAM_TO:
        required: true

jobs:
  backend-test:
    runs-on:
      ubuntu-latest
    steps:
      - name: checkout_repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            backend

      - name: python_install
        uses: actions/setup-python@v6
        with:
          python-version: '3.9.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: install_deps
        run: pip install -r backend/requirements.txt

      - name: test
        run: |
          cd ./backend
          python -m pytest --cov=app

      - name: Notify Telegram
        if: always()
        uses: ./.github/actions/notifier
        with:
          job-name: 'backend-test'
          job-status: ${{ job.status }}
          telegram-to: ${{ secrets.TELEGRAM_TO }}
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}

  backend-build:
    runs-on:
      ubuntu-latest
    needs: backend-test
    steps:
      - name: checkout_repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            backend

      - name: python_install
        uses: actions/setup-python@v6
        with:
          python-version: '3.9.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: install_deps
        run: pip install -r backend/requirements.txt

      - name: Build_package
        run: |
          cd ./backend
          python -m build

      - name: Notify Telegram
        if: always()
        uses: ./.github/actions/notifier
        with:
          job-name: 'backend-build'
          job-status: ${{ job.status }}
          telegram-to: ${{ secrets.TELEGRAM_TO }}
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
