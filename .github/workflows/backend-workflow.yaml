name: backend_CI
on:
  workflow_call:
    secrets:
      TELEGRAM_TOKEN:
        required: true
      TELEGRAM_TO:
        required: true

jobs:
  backend-test:
    runs-on:
      ubuntu-latest
    steps:
      - name: checkout_repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            backend

      - name: python_install
        uses: actions/setup-python@v6
        with:
          python-version: '3.9.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: install_deps
        run: pip install -r backend/requirements.txt

      - name: test
        run: |
          cd ./backend
          python -m pytest --cov=app

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>Job:</b> backend-test
            <b>Status:</b> ${{ job.status == 'success' && '✅ success' || job.status == 'failure' && '❌ failure' || job.status == 'cancelled' && '⚪ cancelled' || '🟡 ' }}${{ job.status != 'success' && job.status != 'failure' && job.status != 'cancelled' && job.status || '' }}
            <b>Workflow:</b> ${{ github.workflow }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Commit:</b> ${{ github.sha }}
            ${{ job.status != 'success' && format('<b>Run:</b> https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) || '' }}

  backend-build:
    runs-on:
      ubuntu-latest
    needs: backend-test
    steps:
      - name: checkout_repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            backend

      - name: python_install
        uses: actions/setup-python@v6
        with:
          python-version: '3.9.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: install_deps
        run: pip install -r backend/requirements.txt

      - name: Build_package
        run: |
          cd ./backend
          python -m build

      - name: Notify Telegram
        if: always()
        uses: ./.github/actions/notifier
        with:
          job-name: 'backend-build'
          job-status: ${{ job.status }}
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
