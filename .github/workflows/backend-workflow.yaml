name: backend_CI
on:
  workflow_call:
    secrets:
      TELEGRAM_TOKEN:
        required: true
      TELEGRAM_TO:
        required: true

jobs:
  backend-test:
    runs-on:
      ubuntu-latest
    steps:
      - name: checkout_repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            backend

      - name: python_install
        uses: actions/setup-python@v6
        with:
          python-version: '3.9.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: install_deps
        run: pip install -r backend/requirements.txt

      - name: test
        run: |
          cd ./backend
          python -m pytest --cov=app

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *Job:* `backend-test`
            *Status:* `${{ job.status }}`
            *Workflow:* `${{ github.workflow }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  backend-build:
    runs-on:
      ubuntu-latest
    needs: backend-test
    steps:
      - name: checkout_repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            backend

      - name: python_install
        uses: actions/setup-python@v6
        with:
          python-version: '3.9.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: install_deps
        run: pip install -r backend/requirements.txt

      - name: Build_package
        run: |
          cd ./backend
          python -m build

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *Job:* `backend-build`
            *Status:* `${{ job.status }}`
            *Workflow:* `${{ github.workflow }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
