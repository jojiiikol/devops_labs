name: SonarQube_Scanner
on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true
      TELEGRAM_TOKEN:
        required: true
      TELEGRAM_TO:
        required: true
jobs:
  sonar-scanner:
    name: SonarQube Scanner
    runs-on: ubuntu-latest
    steps:
      - name: checkout_repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            backend
            Frontend

      - name: python_install
        uses: actions/setup-python@v6
        with:
          python-version: '3.9.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install tox
        run: pip install tox

      - name: Backend coverage
        run: tox -e py

      - name: node_install
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: install_deps
        run: npm ci
        working-directory: Frontend

      - name: Frontend coverage
        run: npm run test:coverage
        working-directory: Frontend

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>Job:</b> sonar-scanner
            <b>Status:</b> ${{ job.status == 'success' && '✅ success' || job.status == 'failure' && '❌ failure' || job.status == 'cancelled' && '⚪ cancelled' || '🟡 ' }}${{ job.status != 'success' && job.status != 'failure' && job.status != 'cancelled' && job.status || '' }}
            <b>Workflow:</b> ${{ github.workflow }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Commit:</b> ${{ github.sha }}
            ${{ job.status != 'success' && format('<b>Run:</b> https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) || '' }}
