name: backend-docker
on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true
      TELEGRAM_TOKEN:
        required: true
      TELEGRAM_TO:
        required: true

jobs:
  backend-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            backend
            argo-cd

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/note-backend:${{ github.sha }}

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>Job:</b> backend-docker
            <b>Status:</b> ${{ job.status == 'success' && '✅ success' || job.status == 'failure' && '❌ failure' || job.status == 'cancelled' && '⚪ cancelled' || '🟡 ' }}${{ job.status != 'success' && job.status != 'failure' && job.status != 'cancelled' && job.status || '' }}
            <b>Workflow:</b> ${{ github.workflow }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Commit:</b> ${{ github.sha }}
            ${{ job.status != 'success' && format('<b>Run:</b> https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) || '' }}
