name: frontend_CI
on:
  workflow_call:
    secrets:
      TELEGRAM_TOKEN:
        required: true
      TELEGRAM_TO:
        required: true
jobs:
  test:
    runs-on:
      ubuntu-latest
    steps:
      - name: checkout_repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            Frontend

      - name: node_install
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: install_deps
        run: npm ci
        working-directory: Frontend

      - name: test
        run: npm run test
        working-directory: Frontend

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *Job:* `frontend-test`
            *Status:* `${{ job.status }}`
            *Workflow:* `${{ github.workflow }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build:
    runs-on:
      ubuntu-latest
    needs: test
    steps:
      - name: checkout_repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            Frontend

      - name: node_install
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: install_deps
        run: npm ci
        working-directory: Frontend

      - name: build
        run: npm run build
        working-directory: Frontend

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *Job:* `frontend-build`
            *Status:* `${{ job.status }}`
            *Workflow:* `${{ github.workflow }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
