name: frontend-docker
on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true
      VITE_API_BASE_URL:
        required: true

jobs:
  frontend-docker:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            Frontend
            argo-cd
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/note-frontend:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

      - name: Update image tag in deployment
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/note-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/note-frontend:${{ github.sha }}|g" argo-cd/frontend.yaml

      - name: Commit new tag
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add argo-cd/frontend.yaml
          git diff --staged --quiet || git commit -m "Update frontend image to ${{ github.sha }} [skip ci]"
          git push