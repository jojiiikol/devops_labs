name: build-test_CI
on:
  push:
    paths:
      - 'backend/**'
      - 'Frontend/**'
      - '.github/workflows/**'
jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            backend
            Frontend
      - name: Check changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'Frontend/**'

  sonar-scanner:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install tox and any other packages
        run: pip install tox
      - name: Run tox
        run: tox -e py
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  backend:
    needs: [ sonar-scanner ]
    uses: ./.github/workflows/backend-workflow.yaml

  frontend:
    needs: [ sonar-scanner, backend ]
    uses: ./.github/workflows/frontend_workflow.yaml

  backend-docker:
    needs: [ sonar-scanner, backend, check-changes ]
    if: ${{ needs.check-changes.outputs.backend_changed == 'true' && needs.backend.result == 'success' }}
    uses: ./.github/workflows/backend-docker.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

  frontend-docker:
    needs: [ sonar-scanner, backend, frontend, check-changes ]
    if: ${{ needs.check-changes.outputs.frontend_changed == 'true' && needs.frontend.result == 'success' }}
    uses: ./.github/workflows/frontend-docker.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
