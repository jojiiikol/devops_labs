name: build-test_CI
on:
  push:
    paths:
      - 'backend/**'
      - 'Frontend/**'
      - '.github/workflows/**'
jobs:

  sonar-scanner:
    uses: ./.github/workflows/sonar-scanner.yaml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  backend:
    needs: [ sonar-scanner ]
    uses: ./.github/workflows/backend-workflow.yaml

  backend-docker:
    permissions:
      contents: write
#    needs: [ sonar-scanner, backend ]
    uses: ./.github/workflows/backend-docker.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

  frontend:
    needs: [ sonar-scanner, backend, backend-docker ]
    uses: ./.github/workflows/frontend_workflow.yaml

  frontend-docker:
    permissions:
      contents: write
#    needs: [ sonar-scanner, backend, frontend, backend-docker ]
    uses: ./.github/workflows/frontend-docker.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
