name: build-test_CI
on:
  push:
    paths:
      - 'backend/**'
      - 'Frontend/**'
      - '.github/workflows/**'
jobs:

  sonar-scanner:
    uses: ./.github/workflows/sonar-scanner.yaml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

  backend:
    needs: [ sonar-scanner ]
    uses: ./.github/workflows/backend-workflow.yaml
    secrets:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

  frontend:
    needs: [ sonar-scanner, backend ]
    uses: ./.github/workflows/frontend_workflow.yaml
    secrets:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

  backend-docker:
    permissions:
      contents: write
#    needs: [ sonar-scanner, backend, frontend ]
    uses: ./.github/workflows/backend-docker.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

  frontend-docker:
    permissions:
      contents: write
#    needs: [ sonar-scanner, backend, frontend, backend-docker ]
    uses: ./.github/workflows/frontend-docker.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

  manifest-update:
#    needs: [ sonar-scanner, backend, frontend, backend-docker, frontend-docker ]
    needs: [ backend-docker, frontend-docker ]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            argo-cd

      - name: Update image tag in deployments
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/note-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/note-frontend:${{ github.sha }}|g" argo-cd/frontend.yaml
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/note-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/note-backend:${{ github.sha }}|g" argo-cd/backend.yaml

      - name: Commit new tag
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add argo-cd
          git diff --staged --quiet || git commit -m "Update image to ${{ github.sha }} [skip ci]"
          git push

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>Job:</b> manifest-update
            <b>Status:</b> ${{ job.status }}
            <b>Workflow:</b> ${{ github.workflow }}
            <b>Branch:</b> ${{ github.ref_name }}
            <b>Commit:</b> ${{ github.sha }}
            <b>Run:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
