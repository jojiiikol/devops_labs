name: build-test_CI
on:
  push:
    paths:
      - 'backend/**'
      - 'Frontend/**'
      - '.github/workflows/**'
jobs:

  sonar-scanner:
    uses: ./.github/workflows/sonar-scanner.yaml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

  backend:
    needs: [ sonar-scanner ]
    uses: ./.github/workflows/backend-workflow.yaml
    secrets:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

  frontend:
    needs: [ sonar-scanner, backend ]
    uses: ./.github/workflows/frontend_workflow.yaml
    secrets:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

  backend-docker:
    permissions:
      contents: write
#    needs: [ sonar-scanner, backend, frontend ]
    uses: ./.github/workflows/backend-docker.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

  frontend-docker:
    permissions:
      contents: write
#    needs: [ sonar-scanner, backend, frontend, backend-docker ]
    uses: ./.github/workflows/frontend-docker.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

  manifest-update:
#    needs: [ sonar-scanner, backend, frontend, backend-docker, frontend-docker ]
    needs: [ backend-docker, frontend-docker ]
    permissions:
      contents: write
    uses: ./.github/workflows/manifest-update.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
