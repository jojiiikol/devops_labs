name: build-test_CI
on:
  push:
    paths:
      - 'backend/**'
      - 'Frontend/**'
      - '.github/workflows/**'
jobs:

  sonar-scanner:
    uses: ./.github/workflows/sonar-scanner.yaml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  backend:
    needs: [ sonar-scanner ]
    uses: ./.github/workflows/backend-workflow.yaml

  frontend:
    needs: [ sonar-scanner, backend ]
    uses: ./.github/workflows/frontend_workflow.yaml

  backend-docker:
    permissions:
      contents: write
#    needs: [ sonar-scanner, backend, frontend ]
    uses: ./.github/workflows/backend-docker.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

  frontend-docker:
    permissions:
      contents: write
#    needs: [ sonar-scanner, backend, frontend, backend-docker ]
    uses: ./.github/workflows/frontend-docker.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

  manifest-update:
#    needs: [ sonar-scanner, backend, frontend, backend-docker, frontend-docker ]
    needs: [ backend-docker, frontend-docker ]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            argo-cd

      - name: Update image tag in deployments
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/note-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/note-frontend:${{ github.sha }}|g" argo-cd/5-app/frontend.yaml
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/note-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/note-backend:${{ github.sha }}|g" argo-cd/5-app/backend.yaml

      - name: Commit new tag
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add argo-cd
          git diff --staged --quiet || git commit -m "Update image to ${{ github.sha }} [skip ci]"
          git push
