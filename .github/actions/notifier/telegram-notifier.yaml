name: "Notify Telegram"

inputs:
  job-status:
    description: 'Job status (success/failure/cancelled/etc)'
    required: true
  job-name:
    description: 'Name of the job'
    required: true
    default: 'Job'
  telegram-to:
    description: 'Telegram chat ID'
    required: true
  telegram-token:
    description: 'Telegram bot token'
    required: true

runs:
  using: "composite"
  steps:
    - name: Notify Telegram
      uses: appleboy/telegram-action@v1.0.1
      with:
        to: ${{ inputs.telegram-to }}
        token: ${{ inputs.telegram-token }}
        format: html
        message: |
          <b>Job:</b> ${{ inputs.job-name }}
          <b>Status:</b> ${{ inputs.job-status == 'success' && '✅ success' || inputs.job-status == 'failure' && '❌ failure' || inputs.job-status == 'cancelled' && '⚪ cancelled' || '🟡 ' }}${{ inputs.job-status != 'success' && inputs.job-status != 'failure' && inputs.job-status != 'cancelled' && inputs.job-status || '' }}
          <b>Workflow:</b> ${{ github.workflow }}
          <b>Branch:</b> ${{ github.ref_name }}
          <b>Commit:</b> ${{ github.sha }}
          ${{ inputs.job-status != 'success' && format('<b>Run:</b> https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) || '' }}